<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>點心訂購表</title>
  <style>
    :root {
      --checkbox-size: 32px;
      --checkbox-gap: 16px;
      --checkbox-scale: 1.2;
      --summary-left: 80.10%;
      --summary-top: 47.51%;
      --summary-width: 17.80%;
      --summary-height: 2.35%;
      --summary-bg: #efe7b0;
      --accent: #124f9c;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: #f2f0e8;
      color: #1f1f1f;
    }

    .top-bar {
      position: sticky;
      top: 0;
      background: #fff;
      padding: 10px;
      display: flex;
      justify-content: center;
      gap: 12px;
      z-index: 1000;
      border-bottom: 1px solid #ddd;
    }

    .top-bar button {
      font-size: 18px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #007aff;
      color: white;
      cursor: pointer;
    }

    .top-bar button:active {
      background: #005ecb;
    }

    .page {
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .paper-wrap {
      position: relative;
      width: min(1488px, calc(100vw - 40px));
      aspect-ratio: 1488 / 2048;
      background: #fff;
      box-shadow: 0 10px 30px rgba(0,0,0,.12);
      overflow: hidden;
    }

    .paper-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .summary-box {
      position: absolute;
      left: var(--summary-left);
      top: var(--summary-top);
      width: var(--summary-width);
      height: var(--summary-height);
      transform: translate(-50%, -50%);
      z-index: 20;
      pointer-events: none;
      background: var(--summary-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 2px;
    }

    .summary-text {
      position: absolute;
      left: 50%;
      top: 50%;
      color: #000;
      font-weight: 900;
      transform-origin: center center;
      white-space: nowrap;
      transform: translate(-50%, -50%);
    }

    .check-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
    }

    .check-item {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .check-item input {
      width: 100%;
      height: 100%;
      margin: 0;
      cursor: pointer;
      accent-color: var(--accent);
      transform: scale(var(--checkbox-scale));
    }

    .status {
      position: fixed;
      left: 16px;
      bottom: 16px;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(0,0,0,.72);
      color: #fff;
      font-size: 14px;
      z-index: 30;
      display: none;
    }

    .status.show { display: block; }
  </style>
</head>
<body>

  <!-- ✅ FIXED: moved here correctly -->
  <div class="top-bar">
    <button onclick="window.print()">列印</button>
    <button onclick="resetSelection()">重新選取</button>
  </div>

  <div class="page">
    <div id="paper" class="paper-wrap">
      <img class="paper-image" src="IMG_0001.jpg" alt="點心訂購表背景">

      <div id="summaryBox" class="summary-box">
        <span id="summaryText" class="summary-text">共 0 天 0 元</span>
      </div>

      <div id="checkLayer" class="check-layer"></div>
    </div>
  </div>

  <div id="status" class="status"></div>

  <script>
    const CONFIG = {
      imageWidth: 1488,
      imageHeight: 2048,
      checkboxSize: 32,
      checkboxGap: 16,
      storageKey: 'snack-order-selected-boxes'
    };

    function resetSelection() {
      localStorage.removeItem(CONFIG.storageKey);
      location.reload();
    }

    function loadSavedSelections() {
      try {
        return new Set(JSON.parse(localStorage.getItem(CONFIG.storageKey) || '[]'));
      } catch {
        return new Set();
      }
    }

    function saveSelections(set) {
      localStorage.setItem(CONFIG.storageKey, JSON.stringify([...set]));
    }

    function updateSummary(boxes, selectedIds) {
      const selectedBoxes = boxes.filter(box => selectedIds.has(box.id) && !box.is_holiday);
      const count = selectedBoxes.length;
      const amount = selectedBoxes.reduce((sum, box) => sum + (box.price || 0), 0);
      document.getElementById('summaryText').textContent = `共 ${count} 天 ${amount} 元`;
    }

    function createCheckbox(box, selectedIds, boxes) {
      if (box.is_holiday) return null;

      const node = document.createElement('label');
      node.className = 'check-item';

      node.style.left = `${((box.location_at_paper.x - CONFIG.checkboxGap - CONFIG.checkboxSize) / CONFIG.imageWidth) * 100}%`;
      node.style.top = `${((box.location_at_paper.y + (box.location_at_paper.h - CONFIG.checkboxSize) / 2) / CONFIG.imageHeight) * 100}%`;
      node.style.width = `${(CONFIG.checkboxSize / CONFIG.imageWidth) * 100}%`;
      node.style.height = `${(CONFIG.checkboxSize / CONFIG.imageHeight) * 100}%`;

      const input = document.createElement('input');
      input.type = 'checkbox';
      input.checked = selectedIds.has(box.id);
      input.dataset.boxId = box.id;

      input.addEventListener('change', () => {
        if (input.checked) {
          selectedIds.add(box.id);
        } else {
          selectedIds.delete(box.id);
        }
        saveSelections(selectedIds);
        updateSummary(boxes, selectedIds);
      });

      node.appendChild(input);
      return node;
    }

    async function init() {
      try {
        const response = await fetch('snack_boxes.json');
        const data = await response.json();

        const boxes = data.boxes;
        const selectedIds = loadSavedSelections();

        const layer = document.getElementById('checkLayer');
        layer.innerHTML = '';

        for (const box of boxes) {
          const checkbox = createCheckbox(box, selectedIds, boxes);
          if (checkbox) layer.appendChild(checkbox);
        }

        updateSummary(boxes, selectedIds);
      } catch (error) {
        console.error(error);
      }
    }

    init();
  </script>

</body>
</html>
