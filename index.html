<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>點心訂購表</title>
  <style>
    :root {
      --checkbox-size: 32px;
      --checkbox-gap: 16px;
      --checkbox-scale: 1.2;
      --summary-left: 80.10%;
      --summary-top: 47.51%;
      --summary-width: 17.80%;
      --summary-height: 2.35%;
      --summary-bg: #efe7b0;
      --accent: #124f9c;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: #f2f0e8;
      color: #1f1f1f;
    }

    .page {
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .paper-wrap {
      position: relative;
      width: min(1488px, calc(100vw - 40px));
      aspect-ratio: 1488 / 2048;
      background: #fff;
      box-shadow: 0 10px 30px rgba(0,0,0,.12);
      overflow: hidden;
    }

    .paper-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .summary-box {
      position: absolute;
      left: var(--summary-left);
      top: var(--summary-top);
      width: var(--summary-width);
      height: var(--summary-height);
      transform: translate(-50%, -50%);
      z-index: 20;
      pointer-events: none;
      background: var(--summary-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 2px;
    }

    .summary-text {
      position: absolute;
      left: 50%;
      top: 50%;
      color: #000;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
      transform-origin: center center;
      font-variant-numeric: tabular-nums;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      letter-spacing: 0;
    }

    .check-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
    }

    .check-item {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .check-item input {
      width: 100%;
      height: 100%;
      margin: 0;
      cursor: pointer;
      accent-color: var(--accent);
      transform: scale(var(--checkbox-scale));
      transform-origin: center;
    }

    .status {
      position: fixed;
      left: 16px;
      bottom: 16px;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(0,0,0,.72);
      color: #fff;
      font-size: 14px;
      z-index: 30;
      display: none;
    }

    .status.show { display: block; }

    @media (max-width: 768px) {
      .page {
        padding: 12px;
      }

      .paper-wrap {
        width: calc(100vw - 24px);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="paper" class="paper-wrap">
      <img class="paper-image" src="IMG_0001.jpg" alt="點心訂購表背景">

      <div id="summaryBox" class="summary-box">
        <span id="summaryText" class="summary-text">共 0 天 0 元</span>
      </div>

      <div id="checkLayer" class="check-layer"></div>
    </div>
  </div>

  <div id="status" class="status"></div>

  <script>
    const CONFIG = {
      imageWidth: 1488,
      imageHeight: 2048,
      checkboxSize: 32,
      checkboxGap: 16,
      storageKey: 'snack-order-selected-boxes',
      summaryBaseFontPx: 36,
      summaryMinScale: 0.45,
      summaryHorizontalPaddingPx: 10,
      summaryVerticalPaddingPx: 4
    };

    function showStatus(message) {
      const el = document.getElementById('status');
      el.textContent = message;
      el.classList.add('show');
    }

    function clearStatus() {
      document.getElementById('status').classList.remove('show');
    }

    function loadSavedSelections() {
      try {
        return new Set(JSON.parse(localStorage.getItem(CONFIG.storageKey) || '[]'));
      } catch {
        return new Set();
      }
    }

    function saveSelections(set) {
      localStorage.setItem(CONFIG.storageKey, JSON.stringify([...set]));
    }

    function getPaperScale() {
      const paper = document.getElementById('paper');
      return paper ? paper.clientWidth / CONFIG.imageWidth : 1;
    }

    function fitSummaryText() {
      const boxEl = document.getElementById('summaryBox');
      const textEl = document.getElementById('summaryText');
      if (!boxEl || !textEl) return;

      const paperScale = getPaperScale();
      const fontPx = CONFIG.summaryBaseFontPx * paperScale;
      textEl.style.fontSize = `${fontPx}px`;
      textEl.style.transform = 'translate(-50%, -50%) scale(1)';

      const naturalWidth = textEl.offsetWidth;
      const naturalHeight = textEl.offsetHeight;
      const maxWidth = Math.max(1, boxEl.clientWidth - CONFIG.summaryHorizontalPaddingPx * 2 * paperScale);
      const maxHeight = Math.max(1, boxEl.clientHeight - CONFIG.summaryVerticalPaddingPx * 2 * paperScale);

      if (!naturalWidth || !naturalHeight) return;

      const scaleX = maxWidth / naturalWidth;
      const scaleY = maxHeight / naturalHeight;
      const scale = Math.max(CONFIG.summaryMinScale, Math.min(scaleX, scaleY, 1));

      textEl.style.transform = `translate(-50%, -50%) scale(${scale})`;
    }

    function updateSummary(boxes, selectedIds) {
      const selectedBoxes = boxes.filter(box => selectedIds.has(box.id) && !box.is_holiday);
      const count = selectedBoxes.length;
      const amount = selectedBoxes.reduce((sum, box) => sum + (box.price || 0), 0);
      document.getElementById('summaryText').textContent = `共 ${count} 天 ${amount} 元`;
      fitSummaryText();
    }

    function createCheckbox(box, selectedIds, boxes) {
      if (box.is_holiday) return null;

      const node = document.createElement('label');
      node.className = 'check-item';
      node.style.left = `${((box.location_at_paper.x - CONFIG.checkboxGap - CONFIG.checkboxSize) / CONFIG.imageWidth) * 100}%`;
      node.style.top = `${((box.location_at_paper.y + (box.location_at_paper.h - CONFIG.checkboxSize) / 2) / CONFIG.imageHeight) * 100}%`;
      node.style.width = `${(CONFIG.checkboxSize / CONFIG.imageWidth) * 100}%`;
      node.style.height = `${(CONFIG.checkboxSize / CONFIG.imageHeight) * 100}%`;
      node.title = `${box.date_text} ${box.item_name} ${box.price}元`;

      const input = document.createElement('input');
      input.type = 'checkbox';
      input.checked = selectedIds.has(box.id);
      input.dataset.boxId = box.id;
      input.addEventListener('change', () => {
        if (input.checked) {
          selectedIds.add(box.id);
        } else {
          selectedIds.delete(box.id);
        }
        saveSelections(selectedIds);
        updateSummary(boxes, selectedIds);
      });

      node.appendChild(input);
      return node;
    }

    async function init() {
      try {
        const response = await fetch('snack_boxes.json', { cache: 'no-store' });
        if (!response.ok) throw new Error(`JSON load failed: ${response.status}`);
        const data = await response.json();
        if (!data || !Array.isArray(data.boxes)) {
          throw new Error('snack_boxes.json format is invalid');
        }

        const boxes = data.boxes.slice().sort((a, b) => a.id.localeCompare(b.id));
        const selectedIds = loadSavedSelections();
        const layer = document.getElementById('checkLayer');
        layer.innerHTML = '';

        for (const box of boxes) {
          const checkbox = createCheckbox(box, selectedIds, boxes);
          if (checkbox) layer.appendChild(checkbox);
        }

        updateSummary(boxes, selectedIds);
        window.addEventListener('resize', fitSummaryText);
        clearStatus();
      } catch (error) {
        console.error(error);
        showStatus(`載入失敗：${error.message}`);
      }
    }

    init();
  </script>
</body>
</html>
